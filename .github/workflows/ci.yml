name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '17', '21' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn compile -B

    - name: Run tests (excluding stress tests)
      run: mvn test -B -DexcludedGroups=stress

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-java-${{ matrix.java }}
        path: target/surefire-reports/

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Check code style
      run: mvn checkstyle:check -B || true

    - name: Analyze with SonarCloud (optional)
      if: ${{ secrets.SONAR_TOKEN != '' }}
      run: mvn sonar:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }} -B || true

  dependency-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Check dependencies for vulnerabilities
      run: mvn dependency-check:check -B || true

  package:
    runs-on: ubuntu-latest
    needs: [build, code-quality]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Package application
      run: mvn package -DskipTests -B

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: task-engine-jar
        path: target/*.jar

  # Stress tests - run manually or on schedule (not on every push)
  stress-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run stress tests
      run: mvn test -B -Dgroups=stress

    - name: Upload stress test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stress-test-results
        path: target/surefire-reports/