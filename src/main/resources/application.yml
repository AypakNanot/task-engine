# Task Engine Configuration Defaults
task-engine:
  # Global maximum threads across all pools
  global-max-threads: 200

  # Threads to add/remove per scaling event
  scale-factor: 2

  # Queue depth percentage to trigger scale-up (0-100)
  scale-up-threshold: 80

  # Idle timeout before scale-down (ms)
  idle-timeout: 60000

  # Shutdown timeout for graceful shutdown (seconds)
  shutdown-timeout: 30

  # QPS calculation window (ms)
  qps-window-size: 60000

  # Queue monitoring interval (ms)
  queue-monitor-interval: 100

  pools:
    type1-init:
      core-size: 1
      max-size: 8
    type2-cron:
      core-size: 4
      max-size: 4
    type3-high-freq:
      core-size: 16
      max-size: 32
      queue-capacity: 10000
    type4-background:
      core-size: 2
      max-size: 4
      queue-capacity: 100

# Spring Boot Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"